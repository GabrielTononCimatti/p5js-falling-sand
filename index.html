<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Falling Sand</title>
  <meta name="description" content="Falling sand simulation built with p5.js" />
  <meta name="author" content="Gabriel Tonon Cimatti" />
  <link rel="stylesheet" type="text/css" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
</head>

<body>
  <div id="container">
    <div id="canvas-wrapper"></div>
    <div id="controls">
      <div class="control-group">
        <label for="sand-color">Areia</label>
        <div class="color-input">
          <input type="color" id="sand-color" value="#ffffff" />
          <input type="text" id="sand-hex" value="#ffffff" maxlength="7" spellcheck="false" />
        </div>
      </div>
      <div class="control-group">
        <label for="bg-color">Fundo</label>
        <div class="color-input">
          <input type="color" id="bg-color" value="#323232" />
          <input type="text" id="bg-hex" value="#323232" maxlength="7" spellcheck="false" />
        </div>
      </div>
      <button id="clear-btn">Limpar</button>
    </div>
  </div>
  <script src="main.js"></script>
</body>

</html>
